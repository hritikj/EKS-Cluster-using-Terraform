apiVersion: apps/v1
kind: Deployment
metadata:
  name: html-css-game
spec:
  replicas: 2
  selector:
    matchLabels:
      app: game
    template:
      metadata:
        labels:
          app: game
      spec:
        containers:
          - name: html-css-game
            image: ${ecr_repo}:latest
            ports:
             - containerPort: 80
